# LiteLLM proxy config for `claudex` (see README "claudex"). Exposes an
# Anthropic /v1/messages endpoint that Claude Code talks to, and routes it to
# OpenAI. No secrets live here — keys are read from the environment at runtime.
#
# Start it with `claudex-proxy`; point Claude Code at it with `claudex`.

model_list:
  # The model `claudex` requests (via --model / CLAUDE_CODE_SUBAGENT_MODEL).
  # Swap the backend `model:` for whichever OpenAI model you actually want.
  - model_name: gpt-5.6-sol
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # Catch-all so Claude Code's background / small-fast-model calls don't 400 —
  # routes anything else to a cheap OpenAI model.
  - model_name: "*"
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # Silently drop request params OpenAI doesn't accept (Anthropic-only fields).
  drop_params: true

general_settings:
  # Optional auth for the local proxy. Env unset => open on localhost (a startup
  # warning, fine for a single-user box). Set LITELLM_MASTER_KEY (and match it in
  # CLAUDEX_AUTH_TOKEN) to require a key — e.g. on a shared machine.
  master_key: os.environ/LITELLM_MASTER_KEY
