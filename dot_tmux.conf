# Mouse support (scrolling, clicking panes, resizing)
set -g mouse on

# Start window/pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape key delay (important for Vim users)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Focus events
set -g focus-events on

# Easier prefix (many people swap Ctrl-b to Ctrl-a)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Intuitive split keys
bind | split-window -h
bind - split-window -v

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind -T copy-mode WheelUpPane send-keys -N 3 -X scroll-up
bind -T copy-mode WheelDownPane send-keys -N 3 -X scroll-down

