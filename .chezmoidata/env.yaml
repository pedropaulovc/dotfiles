# Neutral, shell-agnostic environment variables.
# Single source of truth: edit here, and every shell's template re-renders
# the correct syntax (export FOO=bar for bash, $env:FOO = 'bar' for pwsh).
#
# Only put values here that are identical across OSes. Anything that differs
# by platform (paths, etc.) belongs behind an {{ if eq .chezmoi.os ... }}
# branch in the individual shell template instead.
env:
  EDITOR: nvim
  PAGER: less
  RUST_BACKTRACE: "1"
  UV_LINK_MODE: copy
