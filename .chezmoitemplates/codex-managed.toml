# Chezmoi-managed Codex settings. This file is not applied to a target — it is
# injected into run_onchange_codex-config.py.tmpl via `includeTemplate` and each
# key here is upserted into ~/.codex/config.toml, leaving unmanaged keys untouched.
# Editing this file changes the rendered script's hash, so the merge re-runs on
# the next `chezmoi apply`. Add new managed settings here, not by hand-editing
# ~/.codex/config.toml.
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[features]
memories = true

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_CODE_NO_FLICKER = "1"
CLAUDE_CODE_WORKFLOWS = "1"
COLORTERM = "truecolor"
CLAUDE_AFK_TIMEOUT_MS = "1800000"

[tui]
status_line = ["model", "context-remaining", "five-hour-limit", "weekly-limit", "current-dir", "git-branch", "branch-changes"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.6-sol" = 4

[windows]
sandbox = "elevated"

[plugins]
"developing-solidworks@agent-plugins" = { enabled = true }
"mediocrity-detector@agent-plugins" = { enabled = true }
"memory-to-repo@agent-plugins" = { enabled = true }
"unrelated-issue-detector@agent-plugins" = { enabled = true }
"worktree-reset@agent-plugins" = { enabled = true }
"watch-pr@agent-plugins" = { enabled = true }
"command-chain-separator@agent-plugins" = { enabled = true }
"gh-issue@agent-plugins" = { enabled = true }
"playwright-cli-headed@agent-plugins" = { enabled = true }
"pr-comments@agent-plugins" = { enabled = true }

# Only the marketplace's source identity is managed; last_updated/last_revision
# are runtime state Codex rewrites on every marketplace refresh, so we leave them.
[marketplaces.agent-plugins]
source_type = "git"
source = "https://github.com/pedropaulovc/agent-plugins.git"
